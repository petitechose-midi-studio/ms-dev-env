name: Setup ms runtime
description: Prepare Python, uv, and synced ms-dev-env dependencies.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"
  working-directory:
    description: Directory containing pyproject.toml for uv sync.
    required: false
    default: "."
  extras:
    description: Optional dependency group to sync.
    required: false
    default: "dev"

runs:
  using: composite
  steps:
    - name: Expose GitHub token to shell tools
      shell: bash
      env:
        ACTIONS_GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        {
          printf 'GITHUB_TOKEN=%s\n' "$ACTIONS_GITHUB_TOKEN"
          printf 'GH_TOKEN=%s\n' "$ACTIONS_GITHUB_TOKEN"
        } >> "$GITHUB_ENV"

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Sync Python deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        uv sync --frozen --extra "${{ inputs.extras }}"
