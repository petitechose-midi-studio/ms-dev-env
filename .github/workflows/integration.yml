name: Release Alignment

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build_wasm:
        description: "Build WASM outputs (Linux only)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-alignment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_alignment:
    name: release alignment
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Rust (main/manual only)
        if: ${{ github.event_name != 'pull_request' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps (main/manual only)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsdl2-dev libasound2-dev libudev-dev libusb-1.0-0-dev

      - name: Sync Python deps
        run: uv sync --frozen --extra dev

      - name: Setup workspace (real)
        run: uv run ms setup --skip-prereqs --yes

      - name: Verify release BOM
        run: uv run ms release verify-bom

      - name: Validate release BOM targets (main/manual only)
        if: ${{ github.event_name != 'pull_request' }}
        run: uv run ms release validate-bom-targets

      - name: Build midi-studio-loader (rust, main/manual only)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        working-directory: midi-studio/loader
        run: |
          set -euo pipefail
          cargo build --release

      - name: Build bitwig extension
        shell: bash
        run: |
          set -euo pipefail
          uv run ms build bitwig --target extension --extensions-dir _bitwig_extensions

      - name: Build core (wasm)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_wasm }}
        shell: bash
        run: |
          set -euo pipefail
          uv run ms build core --target wasm

      - name: Build bitwig (wasm)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_wasm }}
        shell: bash
        run: |
          set -euo pipefail
          uv run ms build bitwig --target wasm
