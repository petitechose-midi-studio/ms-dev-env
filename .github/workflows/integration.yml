name: Release Alignment

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build_wasm:
        description: "Build WASM outputs (Linux only)"
        type: boolean
        default: false
      request_id:
        description: "Internal dispatch correlation id"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: release-alignment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_alignment:
    name: release alignment
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Write dispatch marker
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.request_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ms/dispatch
          printf '%s\n' '${{ inputs.request_id }}' > ".ms/dispatch/${{ inputs.request_id }}.txt"

      - name: Upload dispatch marker
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.request_id != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-${{ inputs.request_id }}
          path: .ms/dispatch/${{ inputs.request_id }}.txt
          if-no-files-found: error

      - name: Setup ms runtime
        uses: ./.github/actions/setup-ms-runtime

      - name: Restore setup download cache
        uses: actions/cache@v5
        with:
          path: .ms/cache/downloads
          key: release-alignment-downloads-${{ runner.os }}-${{ hashFiles('ms/data/toolchains.toml', 'ms/data/bridge_checksums.toml') }}
          restore-keys: |
            release-alignment-downloads-${{ runner.os }}-

      - name: Setup Rust (manual WASM only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_wasm }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsdl2-dev libasound2-dev libudev-dev libusb-1.0-0-dev

      - name: Setup workspace (real)
        run: uv run ms setup --skip-prereqs --yes

      - name: Verify release BOM
        run: uv run ms release verify-bom

      - name: Validate release BOM targets (main/manual only)
        if: ${{ github.event_name != 'pull_request' }}
        run: uv run ms release validate-bom-targets

      - name: Build bitwig extension
        shell: bash
        run: |
          set -euo pipefail
          uv run ms build bitwig --target extension --extensions-dir _bitwig_extensions

      - name: Build core (wasm)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_wasm }}
        shell: bash
        run: |
          set -euo pipefail
          uv run ms build core --target wasm

      - name: Build bitwig (wasm)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_wasm }}
        shell: bash
        run: |
          set -euo pipefail
          uv run ms build bitwig --target wasm
