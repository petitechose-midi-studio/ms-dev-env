# Release dependency graph.
#
# This graph describes product/release ordering. It references repositories from
# ms/data/repos.toml by GitHub slug and deliberately does not duplicate URLs.

[[nodes]]
id = "oc-framework"
repo = "open-control/framework"
role = "bom_dependency"

[[nodes]]
id = "oc-note"
repo = "open-control/note"
role = "bom_dependency"
depends_on = ["oc-framework"]

[[nodes]]
id = "oc-hal-common"
repo = "open-control/hal-common"
role = "bom_dependency"

[[nodes]]
id = "oc-hal-teensy"
repo = "open-control/hal-teensy"
role = "bom_dependency"
depends_on = ["oc-hal-common"]

[[nodes]]
id = "oc-ui-lvgl"
repo = "open-control/ui-lvgl"
role = "bom_dependency"

[[nodes]]
id = "oc-ui-lvgl-components"
repo = "open-control/ui-lvgl-components"
role = "bom_dependency"
depends_on = ["oc-ui-lvgl"]

[[nodes]]
id = "core"
repo = "petitechose-midi-studio/core"
role = "bom_consumer"
depends_on = [
  "oc-framework",
  "oc-note",
  "oc-hal-common",
  "oc-hal-teensy",
  "oc-ui-lvgl",
  "oc-ui-lvgl-components",
]
validations = ["core-dev", "core-tests", "core-release"]

